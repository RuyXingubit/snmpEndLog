services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: nms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nms}
      POSTGRES_USER: ${POSTGRES_USER:-nms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nms} -d ${POSTGRES_DB:-nms}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  collector:
    build:
      context: .
      dockerfile: collector/Dockerfile
    container_name: nms-collector
    restart: unless-stopped
    network_mode: host
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-nms}
      DB_USER: ${POSTGRES_USER:-nms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SNMP_DEFAULT_INTERVAL: ${SNMP_DEFAULT_INTERVAL:-300}
      LOG_UDP_PORT: ${LOG_UDP_PORT:-5514}
      LOG_TCP_PORT: ${LOG_TCP_PORT:-5514}
      MIGRATIONS_DIR: /app/db/migrations

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: nms-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-nms}
      DB_USER: ${POSTGRES_USER:-nms}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      WEB_PORT: ${WEB_PORT:-8080}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"

volumes:
  db_data:
    driver: local

{{template "layout.html" .}}

{{define "content"}}
<div class="page-header">
    <h2>📋 Logs</h2>
    <div class="header-actions">
        <span class="text-muted" style="font-size: 0.8rem;" id="log-count"></span>
    </div>
</div>

<!-- Filters -->
<div class="card mb-md">
    <div class="log-filters">
        <input type="text" class="form-input" id="log-search" placeholder="🔍 Buscar nos logs..."
               style="flex: 2;">
        <label style="display: flex; align-items: center; gap: 4px; font-size: 0.75rem; color: var(--text-secondary); white-space: nowrap; cursor: pointer;" title="Busca exata por substring (ILIKE). Melhor para termos técnicos como PKT_OUTQUEDROP.">
            <input type="checkbox" id="log-exact" style="accent-color: var(--blue);">
            Exata
        </label>
        <select class="form-input form-select" id="log-host">
            <option value="">Todos os hosts</option>
        </select>
        <select class="form-input form-select" id="log-severity">
            <option value="">Todas severidades</option>
            <option value="emergency">🔴 Emergency</option>
            <option value="alert">🔴 Alert</option>
            <option value="critical">🔴 Critical</option>
            <option value="error">🟠 Error</option>
            <option value="warning">🟡 Warning</option>
            <option value="notice">🔵 Notice</option>
            <option value="info">🔵 Info</option>
            <option value="debug">⚪ Debug</option>
        </select>
        <select class="form-input form-select" id="log-period">
            <option value="15m">Últimos 15 min</option>
            <option value="1h" selected>Última hora</option>
            <option value="6h">Últimas 6 horas</option>
            <option value="24h">Últimas 24 horas</option>
            <option value="7d">Últimos 7 dias</option>
            <option value="30d">Últimos 30 dias</option>
        </select>
        <button class="btn btn-primary" onclick="searchLogs()">Buscar</button>
        <button class="btn btn-sm" onclick="exportCSV()" title="Exportar CSV" style="padding: 0.5rem 0.75rem;">📥 CSV</button>
        <button class="btn btn-sm" onclick="exportTXT()" title="Exportar TXT" style="padding: 0.5rem 0.75rem;">📄 TXT</button>
        <button class="btn btn-sm" onclick="openSendToAI()" title="Enviar logs filtrados para sessão de IA" style="padding: 0.5rem 0.75rem;">🤖 Enviar para IA</button>
    </div>
</div>

<!-- Severity Stats -->
<div class="stats-grid" id="severity-stats" style="margin-bottom: var(--space-md);"></div>

<!-- Log Table -->
<div class="card">
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Host</th>
                    <th>Severidade</th>
                    <th>App</th>
                    <th>Mensagem</th>
                </tr>
            </thead>
            <tbody id="log-table-body">
                <tr>
                    <td colspan="5" class="empty-state">
                        <div class="loading-spinner"></div>
                        <p class="mt-md">Carregando logs...</p>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
        <button class="btn btn-sm" id="prev-page" onclick="changePage(-1)" disabled>← Anterior</button>
        <span class="page-info" id="page-info">Página 1</span>
        <button class="btn btn-sm" id="next-page" onclick="changePage(1)">Próxima →</button>
    </div>
</div>

<script src="/static/js/logs.js"></script>
<script>
    // Initial load
    loadHosts();
    loadLogStats();
    searchLogs();

    // Auto-refresh
    setInterval(() => {
        loadLogStats();
    }, 30000);

    // Search on Enter
    document.getElementById('log-search').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') searchLogs();
    });

    // Filter change triggers search
    ['log-host', 'log-severity', 'log-period'].forEach(id => {
        document.getElementById(id).addEventListener('change', searchLogs);
    });

    // Exact checkbox triggers search
    document.getElementById('log-exact').addEventListener('change', searchLogs);
</script>

<!-- Modal: Enviar para sessão de IA -->
<div class="modal-overlay" id="ai-session-modal">
    <div class="modal">
        <div class="modal-header">
            <h3>🤖 Enviar Logs para IA</h3>
            <button class="modal-close" onclick="closeAIModal()">✕</button>
        </div>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: var(--space-md);">
            Os logs filtrados atuais serão adicionados como contexto na sessão selecionada.
        </p>
        <div class="modal-session-list" id="ai-modal-sessions">
            <div style="padding: 1rem; text-align: center; color: var(--text-muted); font-size: 0.8rem;">Carregando sessões...</div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-sm" onclick="createAndSendToAI()">+ Nova Sessão</button>
            <button class="btn btn-primary btn-sm" onclick="confirmSendToAI()" id="btn-confirm-send" disabled>Enviar</button>
        </div>
    </div>
</div>
{{end}}
